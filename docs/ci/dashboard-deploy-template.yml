# Template — copy to `.github/workflows/dashboard-deploy.yml` in your repo.
#
# Builds the RevitCli dashboard and publishes it to GitHub Pages on every
# push to the default branch. The dashboard ships with `<meta name="robots"
# content="noindex">` so search engines do NOT index your model health
# data — but a public Pages deploy is still publicly fetchable, so DO NOT
# enable this on a repo whose `.revitcli/history/` you want to keep
# private. For private dashboards, set the repo to private and use
# GitHub's "Pages built from private repos" feature (Pro / Enterprise).

name: Deploy RevitCli Dashboard

on:
  push:
    branches: [main]
  workflow_dispatch:

# Two parallel jobs would race on the deploy lock; serialize.
concurrency:
  group: pages
  cancel-in-progress: false

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      # SHA-pin every third-party action per the supply-chain hardening
      # guide. Update the comment label and the SHA together.

      # actions/checkout v4.2.2
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
        with:
          fetch-depth: 1

      # actions/setup-node v4.1.0
      - uses: actions/setup-node@39370e3970a6d050c480ffad4ff0ed4d3fdee5af
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: dashboard/package-lock.json

      # actions/setup-dotnet v4.3.1
      - uses: actions/setup-dotnet@67a3573c9a986a3f9c594539f4ab511d57bb3ce9
        with:
          dotnet-version: "8.0.x"

      - name: Install RevitCli
        run: |
          dotnet tool install -g RevitCli
          echo "$HOME/.dotnet/tools" >> "$GITHUB_PATH"

      - name: Build the dashboard SPA
        working-directory: dashboard
        run: |
          npm ci
          # Set BASE_PATH for project pages (org.github.io/repo). Drop
          # this line for user/org root pages (org.github.io).
          BASE_PATH="/${GITHUB_REPOSITORY##*/}" npm run build

      - name: Bundle history into the deploy folder
        # Replace --history-dir with the path to your committed history
        # store. `--project NAME:DIR` (repeatable) feeds the
        # /projects route — drop or extend as needed.
        run: |
          revitcli dashboard build \
            --output ./public \
            --history-dir ./.revitcli/history \
            --force
          # Multi-project example (uncomment + customize):
          # revitcli dashboard build \
          #   --output ./public \
          #   --project "Office:./projects/office/.revitcli/history" \
          #   --project "Residential:./projects/residential/.revitcli/history" \
          #   --force

      # actions/upload-pages-artifact v3.0.1
      - uses: actions/upload-pages-artifact@56afc609e74202658d3ffba0e8f6dda462b719fa
        with:
          path: ./public

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      # actions/deploy-pages v4.0.5
      - id: deployment
        uses: actions/deploy-pages@d6db90164ac5ed86f2b6aed7e0febac1b1eb7448
