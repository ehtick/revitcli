name: Publish to NuGet

on:
  push:
    tags:
      - "v*"

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Setup .NET
        uses: actions/setup-dotnet@67a3573c9a986a3f9c594539f4ab511d57bb3ce9 # v4.3.1
        with:
          dotnet-version: "8.0.x"

      - name: Extract version from tag
        id: version
        run: echo "VERSION=${GITHUB_REF_NAME#v}" >> $GITHUB_OUTPUT

      - name: Restore dependencies
        run: |
          dotnet restore shared/RevitCli.Shared/RevitCli.Shared.csproj
          dotnet restore src/RevitCli/RevitCli.csproj
          dotnet restore tests/RevitCli.Tests/RevitCli.Tests.csproj

      - name: Build
        run: |
          dotnet build shared/RevitCli.Shared/RevitCli.Shared.csproj -c Release --no-restore /p:Version=${{ steps.version.outputs.VERSION }}
          dotnet build src/RevitCli/RevitCli.csproj -c Release --no-restore /p:Version=${{ steps.version.outputs.VERSION }}
          dotnet build tests/RevitCli.Tests/RevitCli.Tests.csproj -c Release --no-restore /p:Version=${{ steps.version.outputs.VERSION }}

      - name: Test
        run: dotnet test tests/RevitCli.Tests/RevitCli.Tests.csproj -c Release --no-restore --no-build

      - name: Pack
        run: dotnet pack src/RevitCli -c Release --no-build -o ./nupkg /p:Version=${{ steps.version.outputs.VERSION }}

      - name: Publish to NuGet
        run: dotnet nuget push ./nupkg/*.nupkg --api-key ${{ secrets.NUGET_API_KEY }} --source https://api.nuget.org/v3/index.json --skip-duplicate
