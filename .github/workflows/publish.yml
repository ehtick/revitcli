name: Publish to NuGet

on:
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag to publish, for example v2.3.0"
        required: true
        type: string

jobs:
  publish:
    runs-on: windows-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          ref: ${{ inputs.tag }}

      - name: Setup .NET
        uses: actions/setup-dotnet@67a3573c9a986a3f9c594539f4ab511d57bb3ce9 # v4.3.1
        with:
          dotnet-version: "8.0.x"

      - name: Extract version from tag
        id: version
        shell: pwsh
        run: |
          $tag = "${{ inputs.tag }}".Trim()
          if ([string]::IsNullOrWhiteSpace($tag)) {
            throw "A release tag input is required."
          }
          $version = $tag -replace '^v', ''
          echo "VERSION=$version" >> $env:GITHUB_OUTPUT

      - name: Validate NuGet API key
        shell: pwsh
        env:
          NUGET_API_KEY: ${{ secrets.NUGET_API_KEY }}
        run: |
          if ([string]::IsNullOrWhiteSpace($env:NUGET_API_KEY)) {
            throw "NUGET_API_KEY is not configured. Add the repository secret before running this manual workflow."
          }

      - name: Restore dependencies
        run: |
          dotnet restore shared/RevitCli.Shared/RevitCli.Shared.csproj
          dotnet restore src/RevitCli/RevitCli.csproj
          dotnet restore tests/RevitCli.Tests/RevitCli.Tests.csproj

      - name: Build
        run: |
          dotnet build shared/RevitCli.Shared/RevitCli.Shared.csproj -c Release --no-restore /p:Version=${{ steps.version.outputs.VERSION }}
          dotnet build src/RevitCli/RevitCli.csproj -c Release --no-restore /p:Version=${{ steps.version.outputs.VERSION }}
          dotnet build tests/RevitCli.Tests/RevitCli.Tests.csproj -c Release --no-restore /p:Version=${{ steps.version.outputs.VERSION }}

      - name: Test
        run: dotnet test tests/RevitCli.Tests/RevitCli.Tests.csproj -c Release --no-restore --no-build

      - name: Pack
        run: dotnet pack src/RevitCli -c Release --no-build -o ./nupkg /p:Version=${{ steps.version.outputs.VERSION }}

      - name: Publish to NuGet
        shell: pwsh
        env:
          NUGET_API_KEY: ${{ secrets.NUGET_API_KEY }}
        run: |
          $packages = Get-ChildItem -Path ./nupkg -Filter *.nupkg
          foreach ($package in $packages) {
            dotnet nuget push $package.FullName --api-key "$env:NUGET_API_KEY" --source https://api.nuget.org/v3/index.json --skip-duplicate
          }
