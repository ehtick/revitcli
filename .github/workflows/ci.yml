name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-and-test:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Setup .NET
        uses: actions/setup-dotnet@67a3573c9a986a3f9c594539f4ab511d57bb3ce9 # v4.3.1
        with:
          dotnet-version: "8.0.x"

      - name: Cache NuGet packages
        uses: actions/cache@0400d5f644dc74513175e3cd8d07132dd4860809 # v4.2.4
        with:
          path: ~/.nuget/packages
          key: ${{ runner.os }}-nuget-${{ hashFiles('**/*.csproj', '**/Directory.Packages.props') }}
          restore-keys: |
            ${{ runner.os }}-nuget-

      - name: Restore CLI projects
        run: |
          dotnet restore shared/RevitCli.Shared/RevitCli.Shared.csproj
          dotnet restore src/RevitCli/RevitCli.csproj
          dotnet restore tests/RevitCli.Tests/RevitCli.Tests.csproj

      - name: Build CLI
        run: |
          dotnet build shared/RevitCli.Shared/RevitCli.Shared.csproj --no-restore
          dotnet build src/RevitCli/RevitCli.csproj --no-restore
          dotnet build tests/RevitCli.Tests/RevitCli.Tests.csproj --no-restore

      - name: Test CLI
        run: dotnet test tests/RevitCli.Tests/ --no-build --verbosity normal
