name: Release

on:
  push:
    tags:
      - "v*"

jobs:
  release:
    runs-on: [self-hosted, windows, revit2026]
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Setup .NET
        uses: actions/setup-dotnet@67a3573c9a986a3f9c594539f4ab511d57bb3ce9 # v4.3.1
        with:
          dotnet-version: "8.0.x"

      - name: Extract version from tag
        id: version
        shell: pwsh
        run: |
          $version = "${{ github.ref_name }}" -replace '^v', ''
          echo "VERSION=$version" >> $env:GITHUB_OUTPUT

      - name: Test CLI
        run: dotnet test tests/RevitCli.Tests --verbosity normal /p:Version=${{ steps.version.outputs.VERSION }}

      - name: Build CLI
        run: dotnet publish src/RevitCli -c Release -o ./stage/bin /p:Version=${{ steps.version.outputs.VERSION }}

      - name: Resolve Revit 2026 install path
        id: revit2026
        shell: pwsh
        run: |
          $installDir = "${{ vars.REVITCLI_REVIT2026_INSTALL_DIR }}"
          if ([string]::IsNullOrWhiteSpace($installDir)) {
            $installDir = [Environment]::GetEnvironmentVariable("REVITCLI_REVIT2026_INSTALL_DIR")
          }
          if ([string]::IsNullOrWhiteSpace($installDir)) {
            $installDir = Join-Path $env:ProgramFiles "Autodesk\Revit 2026"
          }
          foreach ($dll in @("RevitAPI.dll", "RevitAPIUI.dll")) {
            $path = Join-Path $installDir $dll
            if (-not (Test-Path -LiteralPath $path)) {
              throw "Missing $dll at $installDir. Set REVITCLI_REVIT2026_INSTALL_DIR to the Revit 2026 install directory."
            }
          }
          "path=$installDir" >> $env:GITHUB_OUTPUT
          Write-Host "Using Revit 2026 install dir: $installDir"

      - name: Build Add-in (Revit 2026)
        shell: pwsh
        run: |
          $tmp = Join-Path $env:RUNNER_TEMP "revitcli-addin-2026"
          $out = "./stage/addin/2026"
          $installDir = "${{ steps.revit2026.outputs.path }}"
          Remove-Item -LiteralPath $tmp -Recurse -Force -ErrorAction SilentlyContinue
          Remove-Item -LiteralPath $out -Recurse -Force -ErrorAction SilentlyContinue
          dotnet publish src/RevitCli.Addin -c Release -f net8.0-windows -p:RevitYear=2026 -p:Version=${{ steps.version.outputs.VERSION }} "-p:RevitInstallDir=$installDir" -o $tmp
          if (-not (Test-Path -LiteralPath (Join-Path $tmp "RevitCli.Addin.dll"))) {
            throw "Revit 2026 add-in publish did not produce RevitCli.Addin.dll"
          }
          New-Item -ItemType Directory -Path (Split-Path $out) -Force | Out-Null
          Move-Item -LiteralPath $tmp -Destination $out

      - name: Copy install scripts
        shell: pwsh
        run: |
          Copy-Item scripts/install.ps1 ./stage/
          Copy-Item scripts/uninstall.ps1 ./stage/

      - name: Package ZIP
        shell: pwsh
        run: |
          Compress-Archive -Path ./stage/* -DestinationPath ./revitcli-win-x64.zip

      - name: Generate checksum
        shell: pwsh
        run: |
          $hash = (Get-FileHash ./revitcli-win-x64.zip -Algorithm SHA256).Hash
          "$hash  revitcli-win-x64.zip" | Set-Content ./SHA256SUMS.txt

      - name: Create GitHub Release
        uses: softprops/action-gh-release@72f2c25fcb47643c292f7107632f7a47c1df5cd8 # v2.3.2
        with:
          files: |
            revitcli-win-x64.zip
            SHA256SUMS.txt
          body: |
            ## RevitCli ${{ github.ref_name }}

            This release package includes the CLI and the Revit 2026 add-in.
            Source-tree builds still support Revit 2024 and 2025 when matching
            Revit API DLLs are available.

            ### Install
            ```powershell
            Expand-Archive .\revitcli-win-x64.zip -DestinationPath .\revitcli
            cd .\revitcli
            powershell -ExecutionPolicy Bypass -File .\install.ps1

            # Restart Revit, then verify
            revitcli doctor
            ```

            ### Uninstall
            ```powershell
            powershell -ExecutionPolicy Bypass -File "%LocalAppData%\RevitCli\uninstall.ps1"
            ```

            See [CHANGELOG.md](https://github.com/${{ github.repository }}/blob/main/CHANGELOG.md) for details.
          generate_release_notes: false
