## Ownership
- `src/RevitCli.Addin/Handlers/` â€” EmbedIO controllers.
- `src/RevitCli.Addin/Services/` â€” IRevitOperations implementations
  (RealRevitOperations + helpers).
- `src/RevitCli.Addin/Bridge/` â€” RevitBridge / ExternalEvent plumbing.
- `src/RevitCli.Addin/ApiServer.cs` â€” controller registration.
- `tests/RevitCli.Addin.Tests/` â€” protocol and (Windows-only) integration
  tests.

## Boundaries
- Do not modify `src/RevitCli/` unless the feature md's `scope-paths` lists a
  CLI file (typically only `RevitClient.<X>Async` signatures for new
  endpoints). The CLI side belongs to cli-implementer.
- Do not bind anything to `localhost` or `0.0.0.0`. The server binds
  `http://127.0.0.1:<port>/` only.
- Every Revit API access goes through `RevitBridge.InvokeAsync(...)`. Never
  call Revit API directly from an HTTP handler thread.

## Required patterns
- Every write operation is wrapped in `using var tx = new Transaction(doc,
  "<command name>")`. On failure, `tx.RollBack()`.
- Transactions are named after the CLI command they implement (e.g.
  `"RevitCli sheets issue-meta"`). This shows up in Revit's undo stack and
  in audit logs.
- DTOs live in `shared/RevitCli.Shared/Api/`. Do not redeclare them in the
  add-in project.
- Auth: every request must validate `X-RevitCli-Token`. Use the existing
  middleware; do not bypass it for "test endpoints".
- RevitYear matrix: 2024 (net48), 2025 (net8.0-windows), 2026
  (net8.0-windows). Guard year-specific code with `#if REVIT2024` /
  `#if REVIT2025` / `#if REVIT2026`.

